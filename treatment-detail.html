<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <!-- CSS Utama -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/treatment-detail.css" />
    <!-- GOOGLE FONT AESTHETIC -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Detail - Hydra Facial</title>
  </head>
  <body class="page-treatment">
    <div id="navbar-container"></div>

    <section class="section-padding">
      <div class="container">
        <!-- Breadcrumb -->
        <p id="breadcrumb"></p>

        <!-- Content -->
        <div class="detail-grid">
          <div class="detail-text">
            <h1 id="title"></h1>

            <p id="description"></p>

            <div class="detail-info">
              <div>
                <p>Durasi</p>
                <h3 id="duration"></h3>
              </div>

              <div>
                <p>Harga</p>
                <h3 id="price"></h3>
              </div>
            </div>

            <a id="cta" class="btn-primary">Jadwalkan Sekarang</a>
          </div>

          <img id="image" />
        </div>
      </div>
    </section>

    <script src="js/treatment-detail.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
